services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: clusterpulse
      POSTGRES_PASSWORD: clusterpulse
      POSTGRES_DB: clusterpulse
    ports:
      - "5432:5432"
    volumes:
      - clusterpulse_pgdata:/var/lib/postgresql/data

  collector:
    build:
      context: .
      dockerfile: docker/collector.Dockerfile
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg://clusterpulse:clusterpulse@db:5432/clusterpulse

  agent:
    build:
      context: .
      dockerfile: docker/agent.Dockerfile
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg://clusterpulse:clusterpulse@db:5432/clusterpulse
    ports:
      - "8000:8000"

volumes:
  clusterpulse_pgdata:
